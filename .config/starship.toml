[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](green)"

[cmd_duration]
min_time = 1000
format = "in [$duration](bold yellow) "

[directory]
read_only = " "
style = "bold white"
read_only_style = "bold yellow"
truncation_length = 8
truncation_symbol = "…/"

[username]
format = '[\[](bold red)[$user](bold yellow)'
disabled = false
show_always = true

[hostname]
ssh_only = false
format =  '[@](bold green)[$hostname](bold blue)[\]](bold purple) '
trim_at = ".companyname.com"
disabled = false

[time]
disabled = false
format = '[\[$time\]](bold white)'
time_format = "%T"
utc_time_offset = "+1"

[aws]
symbol = "  "

[conda]
symbol = " "

[dart]
symbol = " "

[docker_context]
symbol = " "

[elixir]
